version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: . # Volvemos a poner el punto para que vea la raíz
      dockerfile: backend/Dockerfile # Pero le indicamos dónde está el Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env # Ahora sí encontrará el .env que está en la raíz
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
    volumes:
      - ./frontend:/app/frontend
    depends_on:
      - db

volumes:
  postgres_data:
